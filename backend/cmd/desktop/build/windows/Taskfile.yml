version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the desktop host for Windows
    dir: '{{.USER_WORKING_DIR}}'
    deps:
      - task: common:verify:layout
      - task: common:stage:ui
      - task: common:generate:icons
    cmds:
      - task: generate:syso
      - |
        {{if eq OS "windows"}}
        powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '{{.BIN_DIR}}' | Out-Null"
        {{else}}
        mkdir -p {{.BIN_DIR}}
        {{end}}
      - go build -tags "desktopwails desktopembed" -trimpath -buildvcs=false -ldflags "-w -s -H windowsgui -X main.version={{.VERSION}}" -o {{.BIN_DIR}}/{{.APP_NAME}}.exe .
      - |
        {{if eq OS "windows"}}
        powershell -NoProfile -Command "Remove-Item -Force -ErrorAction SilentlyContinue 'wails_windows_{{.ARCH}}.syso'"
        {{else}}
        rm -f wails_windows_{{.ARCH}}.syso
        {{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'
    env:
      GOOS: windows
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: 0

  package:
    summary: Packages the Windows desktop host
    cmds:
      - task: '{{if eq (.FORMAT | default "nsis") "msix"}}create:msix:package{{else}}create:nsis:installer{{end}}'
    vars:
      FORMAT: '{{.FORMAT | default "nsis"}}'

  generate:syso:
    summary: Generates the Windows `.syso` resource file
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - '{{.WAILS3_BIN}} generate syso -arch {{.ARCH}} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_{{.ARCH}}.syso'
    vars:
      ARCH: '{{.ARCH | default ARCH}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    dir: '{{.USER_WORKING_DIR}}/build/windows/nsis'
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
          VERSION:
            ref: .VERSION
    cmds:
      - '{{.WAILS3_BIN}} generate webview2bootstrapper -dir "{{.USER_WORKING_DIR}}/build/windows/nsis"'
      - |
        {{if eq OS "windows"}}
        makensis -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.USER_WORKING_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.nsi
        {{else}}
        makensis -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.USER_WORKING_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.nsi
        {{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      ARG_FLAG: '{{if eq .ARCH "amd64"}}AMD64{{else}}ARM64{{end}}'
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'

  create:msix:package:
    summary: Creates an MSIX package
    dir: '{{.USER_WORKING_DIR}}'
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
          VERSION:
            ref: .VERSION
    cmds:
      - |
        {{.WAILS3_BIN}} tool msix \
          --name "{{.APP_NAME}}" \
          --executable "{{.USER_WORKING_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" \
          --arch "{{.ARCH}}" \
          --out "{{.USER_WORKING_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}-{{.ARCH}}.msix"
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'

  install:msix:tools:
    summary: Installs tools required for MSIX packaging
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - '{{.WAILS3_BIN}} tool msix-install-tools'

  run:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
