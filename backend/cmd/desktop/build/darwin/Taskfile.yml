version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    desc: Build the macOS desktop binary
    dir: '{{.USER_WORKING_DIR}}'
    deps:
      - task: common:verify:layout
      - task: common:stage:ui
      - task: common:generate:icons
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -tags "desktopwails desktopembed" -trimpath -buildvcs=false -ldflags "-s -w -X main.version={{.VERSION}}" -o {{.BIN_DIR}}/{{.APP_NAME}} .
    vars:
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'

  package:
    desc: Package the macOS desktop app bundle
    dir: '{{.USER_WORKING_DIR}}'
    deps:
      - task: build
        vars:
          VERSION:
            ref: .VERSION
    cmds:
      - rm -rf "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app"
      - rm -f "{{.BIN_DIR}}/{{.ARTIFACT_NAME}}-macos-{{.ARCH}}.zip"
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Resources"
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/MacOS/{{.APP_NAME}}"
      - cp build/darwin/Info.plist "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Info.plist"
      - cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Resources/icons.icns"
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app"
      - ditto -c -k --sequesterRsrc --keepParent "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app" "{{.BIN_DIR}}/{{.ARTIFACT_NAME}}-macos-{{.ARCH}}.zip"
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'

  run:
    desc: Run the macOS desktop app directly from the built binary
    dir: '{{.USER_WORKING_DIR}}'
    deps:
      - task: build
    cmds:
      - "{{.BIN_DIR}}/{{.APP_NAME}}"
