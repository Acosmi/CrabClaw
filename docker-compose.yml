# CrabClaw Docker Compose
#
# Architecture: Rust CLI (openacosmi) + Go Gateway (acosmi)
# See docs/adr/001-rust-cli-go-gateway.md
#
# Usage:
#   docker compose up -d              # Start gateway
#   docker compose run cli health     # Run CLI command
#
# To use the legacy Node.js gateway, set:
#   OPENACOSMI_GATEWAY_IMAGE=crabclaw:local

services:
  # Go Gateway (primary)
  gateway:
    image: ${OPENACOSMI_GATEWAY_IMAGE:-crabclaw-gateway:local}
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      HOME: /home/acosmi
      OPENACOSMI_GATEWAY_TOKEN: ${OPENACOSMI_GATEWAY_TOKEN}
      OPENACOSMI_STATE_DIR: /data/.openacosmi
      OPENACOSMI_WORKSPACE_DIR: /data/workspace
    volumes:
      - ${OPENACOSMI_CONFIG_DIR:-./data/config}:/data/.openacosmi
      - ${OPENACOSMI_WORKSPACE_DIR:-./data/workspace}:/data/workspace
    ports:
      - "${OPENACOSMI_GATEWAY_PORT:-19001}:19001"
    init: true
    restart: unless-stopped
    command: [ "-port", "19001" ]

  # Legacy Node.js Gateway (for backward compatibility)
  gateway-legacy:
    image: ${OPENACOSMI_IMAGE:-crabclaw:local}
    profiles: [ "legacy" ]
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENACOSMI_GATEWAY_TOKEN: ${OPENACOSMI_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${OPENACOSMI_CONFIG_DIR:-./data/config}:/home/node/.openacosmi
      - ${OPENACOSMI_WORKSPACE_DIR:-./data/workspace}:/home/node/.openacosmi/workspace
    ports:
      - "${OPENACOSMI_GATEWAY_PORT:-18789}:18789"
      - "${OPENACOSMI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command: [ "node", "dist/index.js", "gateway", "--bind", "${OPENACOSMI_GATEWAY_BIND:-lan}", "--port", "18789" ]
