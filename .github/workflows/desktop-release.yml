name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to package
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
          - dev
      base_url:
        description: Public base URL that will host artifacts and update.json
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}-${{ inputs.version }}-${{ inputs.channel }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.7'
  NODE_VERSION: '22'
  WAILS_VERSION: 'v3.0.0-alpha.40'

jobs:
  windows-amd64:
    name: Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}

      - name: Build control UI
        shell: bash
        run: npm ci --prefix ui && npm run build --prefix ui

      - name: Package desktop app
        shell: bash
        working-directory: backend/cmd/desktop
        run: wails3 task windows:package ARCH=amd64 VERSION=${{ inputs.version }}

      - name: Stage Windows release artifacts
        shell: pwsh
        working-directory: backend/cmd/desktop
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.DESKTOP_WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.DESKTOP_WINDOWS_CERT_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.DESKTOP_WINDOWS_SIGNTOOL_TIMESTAMP_URL }}
        run: |
          $stage = Join-Path $PWD 'release-stage/windows-amd64'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $installer = Get-ChildItem -Path bin -File -Filter '*-installer.exe' | Select-Object -First 1
          if (-not $installer) {
            throw 'No NSIS installer found in backend/cmd/desktop/bin'
          }

          $statusPath = Join-Path $stage 'WINDOWS_SIGNING_STATUS.txt'
          if ($env:WINDOWS_CERT_BASE64 -and $env:WINDOWS_CERT_PASSWORD) {
            .\build\windows\sign-installer.ps1 `
              -ArtifactPath $installer.FullName `
              -CertificateBase64 $env:WINDOWS_CERT_BASE64 `
              -CertificatePassword $env:WINDOWS_CERT_PASSWORD `
              -TimestampUrl $env:WINDOWS_TIMESTAMP_URL `
              -StatusPath $statusPath
          } else {
            'No Windows signing certificate configured. Installer is unsigned in this workflow run.' | Set-Content -Path $statusPath
          }

          Copy-Item $installer.FullName (Join-Path $stage 'CrabClaw-windows-amd64-installer.exe')

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-windows-amd64
          path: backend/cmd/desktop/release-stage/windows-amd64/*
          if-no-files-found: error
          retention-days: 14

  linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}

      - name: Build control UI
        run: npm ci --prefix ui && npm run build --prefix ui

      - name: Package AppImage
        working-directory: backend/cmd/desktop
        run: wails3 task linux:create:appimage ARCH=amd64 VERSION=${{ inputs.version }}

      - name: Stage Linux release artifacts
        working-directory: backend/cmd/desktop
        run: |
          set -euo pipefail
          stage="release-stage/linux-amd64"
          mkdir -p "$stage"
          appimage="$(find bin -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "$appimage" ]]; then
            echo "No AppImage found in backend/cmd/desktop/bin" >&2
            exit 1
          fi
          cp "$appimage" "$stage/CrabClaw-linux-amd64.AppImage"
          printf '%s\n' 'Linux package signing placeholder only. AppImage is unsigned in this workflow run.' > "$stage/LINUX_SIGNING_STATUS.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-linux-amd64
          path: backend/cmd/desktop/release-stage/linux-amd64/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Assemble Release Bundle
    runs-on: ubuntu-latest
    needs:
      - windows-amd64
      - linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          path: release-inputs
          merge-multiple: true

      - name: Generate multi-platform update manifest
        run: |
          set -euo pipefail
          mkdir -p "backend/cmd/desktop/release/${{ inputs.channel }}"
          go run ./backend/cmd/desktop/build/tools/update_manifest \
            -version "${{ inputs.version }}" \
            -channel "${{ inputs.channel }}" \
            -base-url "${{ inputs.base_url }}" \
            -artifacts-dir "./release-inputs" \
            -output "./backend/cmd/desktop/release/${{ inputs.channel }}/update.json" \
            -checksums "./backend/cmd/desktop/release/${{ inputs.channel }}/SHA256SUMS"

      - name: Validate release bundle
        run: |
          set -euo pipefail
          go run ./backend/cmd/desktop/build/tools/validate_release \
            -manifest "./backend/cmd/desktop/release/${{ inputs.channel }}/update.json" \
            -checksums "./backend/cmd/desktop/release/${{ inputs.channel }}/SHA256SUMS" \
            -artifacts-dir "./release-inputs" \
            -version "${{ inputs.version }}" \
            -channel "${{ inputs.channel }}"

      - name: Write release scope summary
        run: |
          cat <<'EOF' > "backend/cmd/desktop/release/${{ inputs.channel }}/RELEASE_SCOPE.txt"
          Active desktop release scope:
          - windows-nsis-amd64
          - linux-appimage-amd64
          Deferred:
          - macOS desktop release remains outside this workflow until desktop host convergence is complete.
          EOF

      - name: Import GPG signing key
        if: ${{ secrets.DESKTOP_RELEASE_GPG_PRIVATE_KEY != '' && secrets.DESKTOP_RELEASE_GPG_PASSPHRASE != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.DESKTOP_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          if printf '%s' "$GPG_PRIVATE_KEY" | grep -q 'BEGIN PGP'; then
            printf '%s' "$GPG_PRIVATE_KEY" > /tmp/desktop-release.key
          else
            printf '%s' "$GPG_PRIVATE_KEY" | base64 --decode > /tmp/desktop-release.key
          fi
          gpg --batch --import /tmp/desktop-release.key

      - name: Sign release checksums
        if: ${{ secrets.DESKTOP_RELEASE_GPG_PRIVATE_KEY != '' && secrets.DESKTOP_RELEASE_GPG_PASSPHRASE != '' }}
        env:
          GPG_PASSPHRASE: ${{ secrets.DESKTOP_RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor \
            --output "backend/cmd/desktop/release/${{ inputs.channel }}/SHA256SUMS.asc" \
            --detach-sign "backend/cmd/desktop/release/${{ inputs.channel }}/SHA256SUMS"
          printf '%s\n' 'GPG detached signature generated for release checksums.' > "backend/cmd/desktop/release/${{ inputs.channel }}/SIGNING_STATUS.txt"

      - name: Record unsigned release status
        if: ${{ !(secrets.DESKTOP_RELEASE_GPG_PRIVATE_KEY != '' && secrets.DESKTOP_RELEASE_GPG_PASSPHRASE != '') }}
        run: |
          printf '%s\n' 'Release checksum signing is not configured. update.json and artifacts are unsigned at workflow level.' > "backend/cmd/desktop/release/${{ inputs.channel }}/SIGNING_STATUS.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ inputs.version }}-${{ inputs.channel }}
          path: |
            release-inputs/*
            backend/cmd/desktop/release/${{ inputs.channel }}/*
          if-no-files-found: error
          retention-days: 14
